; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
board = esp32dev
lib_compat_mode = strict
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter, log2file
; This board's auto-reset is unreliable. To upload: manually enter download
; mode (hold BOOT, tap EN, release BOOT), then flash with no_reset so esptool
; doesn't toggle the chip back out. Keep the baud low so sync is reliable.
upload_speed = 115200 
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D ELEGANTOTA_USE_PSYCHIC=1
  -D CORE_DEBUG_LEVEL=3
  -D CONFIG_BT_NIMBLE_DEBUG=1
  -D CONFIG_BT_NIMBLE_LOG_LEVEL=2
  -D CONFIG_NIMBLE_CPP_LOG_LEVEL=2
  -D CONFIG_BT_NIMBLE_HCI_LOG=1      ; HCI лог (якщо є в цій версії)
	-D USE_NIMBLE 

lib_deps =
	NimBLE-Arduino 
lib_ignore = BLE             ; <-- prevent the old ESP BLE lib


