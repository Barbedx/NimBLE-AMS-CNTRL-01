; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; Shared defaults for every board (inherited by each [env:*]).
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter, log2file
build_flags =
  -D CORE_DEBUG_LEVEL=3
  -D CONFIG_BT_NIMBLE_LOG_LEVEL=2
  -D CONFIG_NIMBLE_CPP_LOG_LEVEL=2
lib_deps =
  NimBLE-Arduino
  hoeken/PsychicHttp@^1.2.1
lib_ignore = BLE   ; ignore the old Bluedroid BLE lib; we use NimBLE only

; ESP32-C3 SuperMini — primary board. Native USB-Serial/JTAG: upload auto-resets.
[env:esp32dev-mini]
board = esp32-c3-devkitm-1
build_flags =
  ${env.build_flags}
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

; Classic ESP32 dev board. No working auto-reset here: to upload, enter download
; mode manually (hold BOOT, tap EN, release BOOT) just before flashing.
[env:esp32dev]
board = esp32dev
